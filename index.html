        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; background: #f9f9f9; color: #333; }
        
        /* Navegación */
        nav { background: #000; padding: 10px 20px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #333; }

        nav a:hover { color: var(--accent-gold); }

        header { background: var(--dark-bg); color: white; padding: 40px 20px; text-align: center; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .ad-space { background: #eee; border: 1px dashed #ccc; text-align: center; padding: 20px; margin: 30px 0; color: #888; font-size: 0.8rem; text-transform: uppercase; }
        
        h1, h2, h3 { margin: 0; }
        .main-title { font-weight: bold; text-transform: uppercase; letter-spacing: 3px; font-size: 2.5rem; }

        /* Hero Section */
        .hero { 
            display: flex; align-items: flex-end; min-height: 500px; width: 100%; 
            position: relative; overflow: hidden; background-color: #000; cursor: pointer;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.8) 100%),

            background-size: cover; background-position: center 20%; z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; padding: 60px 40px; color: white; max-width: 800px; }

        /* Grid de Artículos */
        .section-title { border-bottom: 3px solid var(--primary-green); padding-bottom: 10px; margin: 40px 0 20px; font-size: 1.8rem; }
        
        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .card {
            position: relative; background: #000; border-radius: 8px; overflow: hidden;
            height: 380px; display: flex; flex-direction: column; justify-content: flex-end;
            transition: transform 0.3s ease; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); }
        .card-bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: 1;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.9) 100%);
        }
        .card-content { position: relative; z-index: 2; padding: 25px; color: white; }
        .card-category { font-size: 0.75rem; font-weight: 900; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card h3 { font-size: 1.5rem; line-height: 1.2; font-weight: 800; }

        footer a { color: #555; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: var(--primary-green); }
